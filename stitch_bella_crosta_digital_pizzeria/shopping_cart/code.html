<script>
        // Micro-interactions for quantity controls
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const span = e.currentTarget.parentElement.querySelector('span:not(.material-symbols-outlined)');
                if (!span) return;
                
                let val = parseInt(span.textContent);
                if (e.currentTarget.querySelector('span').textContent === 'add') {
                    span.textContent = val + 1;
                } else if (e.currentTarget.querySelector('span').textContent === 'remove' && val > 1) {
                    span.textContent = val - 1;
                }
            });
        });
    </script>
